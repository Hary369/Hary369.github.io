<!DOCTYPE html>
<html>
  <head>
    <title>JavaScript Sandbox</title>
    <meta charset="UTF-8" />
  </head>

  <body>
    <h1>Secret Santa</h1>
    <div id="col1">
      <h2>Personnes participant :</h2>
      <p id="participants"></p>
    </div>
    <div id="col2">
      <h2>Ajouter des participants</h2>
      <input type="text" placeholder="Nom" id="nm" />
      <input type="email" placeholder="Email" id="em" />
      <button onclick=Ajout() >Ajouter</button>
    </div>
    <script src="index.mjs" type="module"></script>
    <style>
        body {
          font-family: sans-serif;
        }
        #col1 {
          float: left;
          width: 49%;
          text-align: center;
        }

        h1 {
          text-align: center;
          font-size: 75px;
        }
        #col2 {
          float: right;
          width: 49%;
          text-align: center;
          border: 3px black solid;
          border-radius: 10px;
        }
        h2 {
          font-size: xx-large;
          background-color: blue;
          border-radius: 10px;
          padding: 5px;
        }
        button {
          margin-top: 20px;
          margin-bottom: 20px;
        }
    </style>
  </body>
</html>
